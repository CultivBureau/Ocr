name: Deploy Staging

on:
  push:
    branches:
      - Staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: ENV_STAG,DOCKER_USERNAME
          script: |
            cd ~/Pdf-Converter-Staging
            git fetch origin Staging
            git checkout Staging
            git reset --hard origin/Staging
            echo "$ENV_STAG" > .env.staging
            export DOCKER_USERNAME=$DOCKER_USERNAME
            STAGING_API_BASE_URL=$(awk -F= '/^NEXT_PUBLIC_API_BASE_URL=/{print substr($0, index($0,$2)); exit}' .env.staging)
            if [ -z "$STAGING_API_BASE_URL" ]; then
              echo "NEXT_PUBLIC_API_BASE_URL is missing or empty in .env.staging"
              exit 1
            fi
            echo "Using NEXT_PUBLIC_API_BASE_URL=$STAGING_API_BASE_URL"
            docker compose -p ocr-staging -f docker-compose.staging.yml --env-file .env.staging build
            docker rm -f ocr.stag || true
            docker compose -p ocr-staging -f docker-compose.staging.yml --env-file .env.staging up -d --force-recreate
        env:
          ENV_STAG: ${{ secrets.ENV_STAG }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
